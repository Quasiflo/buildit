[env]
MISE_USE_VERSIONS_HOST = "false" # Force remote version fetching for development

[tools]
# actionlint = "latest"
hk = "latest"
lua = "5.4"
pkl = "latest"

# Linting & Formatting
jq = "latest"
lua-language-server = "latest"
stylua = "latest"
watchexec = "latest"
pitchfork = "latest"
yamllint = "latest"
yamlfmt = "latest"
tombi = "latest"
hadolint = "latest"
shellcheck = "latest"
shfmt = "latest"
"npm:markdownlint-cli" = "latest"
lychee = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ src/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.fix]
description = "Fix linting issues"
run = "hk fix"

[tasks.ci]
description = "Run all CI checks"
depends = ["lint", "test"]

[tasks.cache-clear]
description = "Clear mise cache for this plugin"
run = "mise cache clear buildit"

[tasks.gen_devcontainer]
run = ".devcontainer/gen_devcontainer.sh"

[settings]
lockfile = true
